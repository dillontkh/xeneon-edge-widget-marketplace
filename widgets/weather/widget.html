<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minimal Weather</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
        }
        .temp {
            font-size: 4rem;
            margin: 0;
        }
        .desc {
            font-size: 1.5rem;
            opacity: 0.8;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="temp">22°C</p>
        <p class="desc">Sunny</p>
    </div>
</body>
</html>
