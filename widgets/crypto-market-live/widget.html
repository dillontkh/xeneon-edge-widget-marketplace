<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Market Live</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --card-bg: #2a2a2a;
            --text-main: #ffffff;
            --text-sub: #b0b0b0;
            --accent: #0d47a1;
            --highlight: #00ff85;
            --highlight-red: #ff4444;
            --border: #444;
            --modal-bg: rgba(0, 0, 0, 0.85);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main);
            font-family: var(--font-family); overflow-x: hidden;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        html, body { scrollbar-width: none; }
        html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }

        .widget-author { position: fixed; top: 12px; right: 12px; z-index: 50; font-size: 10px; color: var(--text-sub); opacity: 0.8; }
        .widget-author a { color: var(--highlight); text-decoration: none; }
        .widget-author a:hover { text-decoration: underline; }

        #widget-container {
            padding: 16px; max-width: 1200px; margin: 0 auto; width: 100%;
            box-sizing: border-box; flex-grow: 1; padding-bottom: 40px;
        }

        header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--border);
        }

        .header-left { display: flex; flex-direction: column; gap: 4px; }
        .header-right { display: flex; align-items: center; gap: 12px; padding-bottom: 4px; }

        h2 { margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 1.2px; }

        .date-display {
            font-size: 13px; color: var(--text-sub); font-weight: 400; margin-top: 2px;
        }

        .live-indicator {
            font-size: 11px; color: var(--highlight); display: flex; align-items: center; gap: 6px; font-weight: 600;
        }

        .dot {
            height: 8px; width: 8px; background-color: var(--highlight); border-radius: 50%;
            display: inline-block; animation: pulse 2s infinite;
        }

        .attribution-container {
            display: flex; align-items: center; color: var(--text-sub);
            font-weight: 400; font-size: 10px; opacity: 0.8;
        }
        .attribution-container a { margin-left: 4px; color: var(--highlight); text-decoration: none; }
        .attribution-container .attr-sep { margin: 0 6px; opacity: 0.7; }
        .attribution-container a:hover { text-decoration: underline; }

        .settings-btn {
            background: none; border: none; cursor: pointer; color: var(--text-sub);
            padding: 8px; border-radius: 50%; transition: color 0.2s, background 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .settings-btn:hover { color: var(--text-main); background: rgba(255,255,255,0.1); }
        .settings-btn svg { width: 20px; height: 20px; display: block; }

        .view-toggle {
            display: flex; align-items: center; gap: 4px; background: #333;
            border-radius: 8px; padding: 2px; margin-right: 8px;
        }
        .view-toggle button {
            background: none; border: none; color: var(--text-sub); padding: 6px 8px;
            border-radius: 6px; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .view-toggle button svg { width: 18px; height: 18px; display: block; }
        .view-toggle button:hover { color: var(--text-main); }
        .view-toggle button.active { background: var(--card-bg); color: var(--highlight); }

        #ticker-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px;
        }
        #ticker-grid.compact { display: flex; flex-direction: column; gap: 4px; }
        #ticker-grid.compact .asset-card {
            flex-direction: row; align-items: center; padding: 10px 16px; gap: 16px;
            display: grid; grid-template-columns: 1fr auto auto;
        }
        #ticker-grid.compact .asset-card .asset-card-main { display: contents; }
        #ticker-grid.compact .asset-header { margin: 0; }
        #ticker-grid.compact .asset-info .asset-logo { width: 28px; height: 28px; }
        #ticker-grid.compact .asset-name { font-size: 14px; }
        #ticker-grid.compact .asset-symbol { display: none; }
        #ticker-grid.compact .asset-price { font-size: 16px; margin: 0; text-align: right; }
        #ticker-grid.compact .asset-change { margin: 0; font-size: 12px; text-align: right; min-width: 60px; }

        .asset-card {
            background-color: var(--card-bg); border-radius: 12px; padding: 16px;
            display: flex; flex-direction: row; gap: 12px; align-items: stretch;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3); position: relative;
            border: 1px solid transparent;
            transition: border-color 0.2s, transform 0.2s;
            cursor: grab;
        }
        .asset-card .asset-card-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 12px; }
        .asset-card .asset-chart-wrap {
            width: 90px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
        }
        .asset-card .asset-chart-wrap .chart-expand-row {
            display: flex; justify-content: flex-end; width: 100%; margin-bottom: 2px;
        }
        .asset-card .asset-chart-wrap .chart-expand-btn {
            background: none; border: none; cursor: pointer; color: var(--text-sub);
            padding: 2px; border-radius: 4px; display: flex; align-items: center; justify-content: center;
        }
        .asset-card .asset-chart-wrap .chart-expand-btn:hover { color: var(--highlight); background: rgba(255,255,255,0.1); }
        .asset-card .asset-chart-wrap .chart-expand-btn svg { width: 14px; height: 14px; }
        .asset-card .asset-chart-wrap canvas { display: block; border-radius: 4px; }
        .asset-card .asset-chart-wrap .chart-label { font-size: 9px; color: var(--text-sub); }
        #ticker-grid.compact .asset-card .asset-chart-wrap { display: none; }

        #chart-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #131722; z-index: 101; flex-direction: column;
            padding: 0; margin: 0; box-sizing: border-box;
            overflow: hidden;
        }
        #chart-modal.show { display: flex; }
        body.chart-modal-open { overflow: hidden; }
        #chart-modal::-webkit-scrollbar,
        #chart-modal .chart-modal-content::-webkit-scrollbar,
        #chart-modal .chart-widget-wrap::-webkit-scrollbar { display: none; }
        #chart-modal, #chart-modal .chart-modal-content, #chart-modal .chart-widget-wrap { scrollbar-width: none; }
        #chart-modal .chart-modal-content {
            background: transparent; padding: 0; border: none;
            width: 100%; height: 100%; display: flex; flex-direction: column; position: relative;
        }
        #chart-modal .chart-modal-header {
            position: absolute; top: 12px; right: 12px; z-index: 10;
            display: flex; align-items: center;
        }
        #chart-modal .chart-modal-close {
            background: rgba(0,0,0,0.5); border: none; color: #fff; cursor: pointer;
            padding: 10px; border-radius: 50%; display: flex;
        }
        #chart-modal .chart-modal-close:hover { color: var(--highlight); background: rgba(0,0,0,0.7); }
        #chart-modal .chart-modal-close svg { width: 24px; height: 24px; }
        #chart-modal .chart-widget-wrap {
            flex: 1; min-height: 0; width: 100%; height: 100%; position: relative;
            overflow: hidden;
        }
        #chart-modal iframe { overflow: hidden !important; }
        #chart-modal .chart-widget-wrap .tradingview-widget-container { height: 100%; width: 100%; }
        #chart-modal .chart-widget-wrap .tradingview-widget-container__widget { height: 100%; width: 100%; }
        #chart-tradingview-container { height: 100%; width: 100%; display: flex; }
        #chart-tradingview-container iframe { flex: 1; min-width: 0; min-height: 0; }
        #chart-modal .chart-loading { color: var(--text-sub); text-align: center; padding: 40px; }
        .asset-card:hover { transform: translateY(-2px); }
        .asset-card.dragging { opacity: 0.5; cursor: grabbing; }
        .asset-card.drag-over { border-color: var(--highlight); background: rgba(0,255,133,0.05); }

        .asset-header {
            display: flex; align-items: center; justify-content: space-between;
        }
        .asset-info { display: flex; align-items: center; gap: 12px; }
        .asset-logo {
            width: 40px; height: 40px; object-fit: contain; border-radius: 50%;
        }
        .asset-name { font-weight: 700; font-size: 16px; }
        .asset-symbol { font-size: 11px; color: var(--text-sub); margin-top: 1px; }

        .asset-price {
            font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums;
        }
        .asset-change {
            font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 4px;
        }
        .asset-change.positive { color: var(--highlight); }
        .asset-change.negative { color: var(--highlight-red); }
        .asset-change.neutral { color: var(--text-sub); }

        .message {
            text-align: center; padding: 30px; color: var(--text-sub);
            font-size: 16px; grid-column: 1 / -1;
        }

        #settings-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100;
            justify-content: center; align-items: center;
        }
        body.modal-open #ticker-grid { visibility: hidden; }
        .modal-content {
            background: var(--bg-color); padding: 24px; border-radius: 12px;
            width: 400px; border: 1px solid #444;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            max-height: 85vh; overflow-y: auto;
        }
        .modal-title { margin-top: 0; font-size: 18px; margin-bottom: 20px; }
        .label-text {
            text-align: left; margin-bottom: 8px; font-size: 12px; color:#aaa;
            display: block; margin-top: 15px;
        }
        .asset-search-wrap { position: relative; margin-bottom: 12px; }
        .asset-search-wrap input {
            width: 100%; padding: 10px 12px; background: var(--card-bg); color: #fff;
            border: 1px solid #555; border-radius: 6px; font-size: 14px; box-sizing: border-box;
        }
        .asset-search-wrap input::placeholder { color: #888; }
        .asset-search-dropdown {
            position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px;
            background: var(--card-bg); border: 1px solid #555; border-radius: 6px;
            max-height: 200px; overflow-y: auto; z-index: 10; display: none;
        }
        .asset-search-dropdown.show { display: block; }
        .asset-search-item {
            padding: 8px 12px; font-size: 13px; cursor: pointer;
            display: flex; justify-content: space-between; border-bottom: 1px solid #333;
        }
        .asset-search-item:last-child { border-bottom: none; }
        .asset-search-item:hover { background: #333; }
        .asset-search-item .sym { color: var(--text-sub); font-size: 11px; }
        .selected-assets { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; min-height: 24px; }
        .asset-chip {
            display: inline-flex; align-items: center; gap: 6px; background: #333;
            padding: 4px 10px; border-radius: 6px; font-size: 12px;
        }
        .asset-chip button { background: none; border: none; color: var(--text-sub); cursor: pointer; padding: 0; font-size: 14px; line-height: 1; }
        .asset-chip button:hover { color: var(--highlight-red); }

        select {
            width: 100%; padding: 10px; margin-bottom: 5px;
            background: var(--card-bg); color: #fff; border: 1px solid #555;
            border-radius: 6px; font-size: 14px; outline: none;
        }
        select:focus { border-color: var(--highlight); }
        .modal-actions { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        button.primary {
            background: var(--highlight); color: #000; border: none; padding: 8px 16px;
            border-radius: 6px; font-weight: 700; cursor: pointer;
        }
        button.secondary {
            background: transparent; color: var(--text-sub); border: 1px solid #555;
            padding: 8px 16px; border-radius: 6px; cursor: pointer;
        }
        button:hover { opacity: 0.9; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>

        try {
            const r = await fetch(url);
            if (r.ok) return r;
        } catch (e) { /* CORS or network */ }
        for (const p of CORS_PROXIES) {
            try {
                const r = await fetch(p + encodeURIComponent(url));

    function t(k) { return LANG[lang]?.[k] ?? LANG.en[k] ?? k; }
    function setLang(code) { lang = code; localStorage.setItem("exchange_lang", lang); applyLang(); fetchPrices(); }
    function applyLang() {
        document.title = t("title");
        const h2 = document.querySelector("#widget-container h2"); if (h2) h2.textContent = t("title");
        const liveText = document.getElementById("live-text"); if (liveText) liveText.textContent = " " + t("live");

    let refreshIntervalId = null;
    let allCoins = [];
    const COINS_CACHE_KEY = "coingecko_coins_list";
    const COINS_CACHE_HOURS = 24;

    function setView(mode) {
        viewMode = mode;
        localStorage.setItem("exchange_view", viewMode);
        document.getElementById("view-cards").classList.toggle("active", mode === "cards");
        document.getElementById("view-compact").classList.toggle("active", mode === "compact");
        document.getElementById("ticker-grid").classList.toggle("compact", mode === "compact");
    }

    async function openSettings() {
        if (refreshIntervalId) { clearInterval(refreshIntervalId); refreshIntervalId = null; }
        document.body.classList.add("modal-open");
        document.getElementById("fiat-select").value = fiatCurrency;
        document.getElementById("asset-search").value = "";
        document.getElementById("asset-dropdown").classList.remove("show");
        document.getElementById("asset-dropdown").innerHTML = "";
        await loadCoinsList();
        renderSelectedAssets();
        applyLang();
        document.getElementById("settings-modal").style.display = "flex";
    }

    function closeSettings() {
        document.getElementById("settings-modal").style.display = "none";
        document.body.classList.remove("modal-open");
        if (!refreshIntervalId) refreshIntervalId = setInterval(fetchPrices, REFRESH_RATE);
    }

    function saveSettings() {
        fiatCurrency = document.getElementById("fiat-select").value;
        localStorage.setItem("exchange_fiat", fiatCurrency);
        activeAssets = [...document.querySelectorAll(".asset-chip")].map(c => c.dataset.coinId);
        localStorage.setItem("exchange_active_assets", JSON.stringify(activeAssets));
        closeSettings();
        fetchPrices();
    }

    async function loadCoinsList() {
        try {
            const cached = localStorage.getItem(COINS_CACHE_KEY);
            if (cached) {
                const { data, ts } = JSON.parse(cached);
                if (Date.now() - ts < COINS_CACHE_HOURS * 3600 * 1000) {
                    allCoins = data;
                    return;
                }
            }
            const res = await apiFetch(`${COINGECKO_API}/coins/list?include_platform=false`);
            allCoins = await res.json();
            localStorage.setItem(COINS_CACHE_KEY, JSON.stringify({ data: allCoins, ts: Date.now() }));
        } catch (e) {
            console.error("Failed to load coins list:", e);
            allCoins = [];
        }
    }

    function searchCoins(q) {
        if (!q || q.length < 2) return [];
        const low = q.toLowerCase();
        return allCoins.filter(c =>
            c.name.toLowerCase().includes(low) || c.symbol.toLowerCase().includes(low)
        ).slice(0, 25);
    }

    function renderSelectedAssets() {
        const el = document.getElementById("selected-assets");
        el.innerHTML = "";
        for (const id of activeAssets) {
            const coin = allCoins.find(c => c.id === id) || { id, symbol: id, name: id };
            const chip = document.createElement("span");
            chip.className = "asset-chip";
            chip.dataset.coinId = coin.id;
            const btn = document.createElement("button");
            btn.type = "button";
            btn.textContent = "×";
            btn.onclick = () => removeAsset(coin.id);
            chip.appendChild(document.createTextNode(coin.name + " "));
            const sym = document.createElement("span");
            sym.className = "sym";
            sym.textContent = "(" + coin.symbol.toUpperCase() + ")";
            chip.appendChild(sym);
            chip.appendChild(document.createTextNode(" "));
            chip.appendChild(btn);
            el.appendChild(chip);
        }
    }

    function addAsset(id, name, symbol) {
        if (activeAssets.includes(id)) return;
        activeAssets.push(id);
        renderSelectedAssets();
        document.getElementById("asset-search").value = "";
        document.getElementById("asset-dropdown").classList.remove("show");
        document.getElementById("asset-dropdown").innerHTML = "";
    }

    function removeAsset(id) {
        activeAssets = activeAssets.filter(x => x !== id);
        renderSelectedAssets();
    }

    document.getElementById("asset-search").addEventListener("input", function() {
        const q = this.value.trim();
        const dropdown = document.getElementById("asset-dropdown");
        if (!q || q.length < 2) { dropdown.classList.remove("show"); dropdown.innerHTML = ""; return; }
        const results = searchCoins(q);
        const selected = new Set(activeAssets);
        const filtered = results.filter(c => !selected.has(c.id));
        const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
        dropdown.innerHTML = filtered.slice(0, 20).map(c =>
            `<div class="asset-search-item" data-id="${esc(c.id)}" data-name="${esc(c.name)}" data-symbol="${esc(c.symbol)}">
                <span>${esc(c.name)}</span><span class="sym">${esc(c.symbol).toUpperCase()}</span>
            </div>`
        ).join("") || '<div class="asset-search-item" style="color:#888">' + t("noMatches") + '</div>';
        dropdown.classList.add("show");
        dropdown.querySelectorAll(".asset-search-item[data-id]").forEach(item => {
            item.onclick = () => addAsset(item.dataset.id, item.dataset.name, item.dataset.symbol);
        });
    });
    document.getElementById("asset-search").addEventListener("blur", function() {
        setTimeout(() => document.getElementById("asset-dropdown").classList.remove("show"), 150);
    });

    function formatPrice(n, cur) {
        const sym = { usd: "$", eur: "€", gbp: "£", jpy: "¥", chf: "Fr ", cad: "C$", aud: "A$",
            rub: "₽", cny: "¥", krw: "₩", inr: "₹", brl: "R$", mxn: "$", pln: "zł ", try: "₺", uah: "₴",
            btc: "₿", eth: "Ξ" }[cur] || cur.toUpperCase() + " ";
        if (cur === "btc" || cur === "eth") return `${sym}${n.toFixed(8)}`;
        if (n >= 1e9) return `${sym}${(n / 1e9).toFixed(2)}B`;
        if (n >= 1e6) return `${sym}${(n / 1e6).toFixed(2)}M`;
        if (n >= 1e3) return `${sym}${(n / 1e3).toFixed(2)}K`;
        if (n >= 1) return `${sym}${n.toFixed(2)}`;
        return `${sym}${n.toFixed(6)}`;
    }

    async function fetchPrices() {
        const modalOpen = document.getElementById("settings-modal").style.display === "flex";
        if (modalOpen || document.hidden) return;
        const grid = document.getElementById("ticker-grid");
        if (activeAssets.length === 0) {
            grid.innerHTML = '<div class="message">' + t("selectAsset") + '</div>';
            return;
        }

        const supported = ["usd","eur","gbp","jpy","chf","cad","aud","rub","cny","krw","inr","brl","mxn","pln","try","uah","btc","eth"];
        const vs = supported.includes(fiatCurrency) ? fiatCurrency : "usd";

        try {
            const url = `${COINGECKO_API}/coins/markets?vs_currency=${vs}&ids=${activeAssets.join(",")}&per_page=50&order=market_cap_desc`;
            let res;
            for (let attempt = 0; attempt < 3; attempt++) {
                res = await apiFetch(url);
                if (res.status === 429) {
                    const delay = [5000, 10000, 15000][attempt] || 15000;
                    await new Promise(r => setTimeout(r, delay));
                } else break;
            }
            if (!res.ok) throw new Error(`API ${res.status}`);
            const data = await res.json();
            if (!Array.isArray(data)) {
                throw new Error(data?.status?.message || "API returned invalid data");
            }
            if (data.length === 0) {
                grid.innerHTML = '<div class="message">' + t("noData") + '</div>';
                return;
            }

            document.getElementById("current-date").innerText = new Date().toLocaleDateString(DATE_LOCALE[lang] || "en-US", {
                weekday: "long", year: "numeric", month: "long", day: "numeric", hour: "2-digit", minute: "2-digit"
            });

            const order = activeAssets.reduce((o, id, i) => { o[id] = i; return o; }, {});
            const sorted = [...data].sort((a, b) => (order[a.id] ?? 99) - (order[b.id] ?? 99));
            const coinMap = Object.fromEntries(sorted.map(c => [c.id, c]));

            const existingCards = grid.querySelectorAll(".asset-card[data-coin-id]");
            const needRebuild = existingCards.length !== sorted.length ||
                [...existingCards].some(c => !coinMap[c.dataset.coinId]);
            if (needRebuild) {
                grid.innerHTML = "";
                for (const coin of sorted) {
                    grid.appendChild(buildCard(coin));
                }
                loadAllCharts(grid.querySelectorAll(".asset-card[data-coin-id]"), coinMap);
            } else {
                for (const card of existingCards) {
                    const coin = coinMap[card.dataset.coinId];
                    if (!coin) continue;
                    const price = coin.current_price ?? 0;
                    const change = coin.price_change_percentage_24h;
                    const changeClass = change > 0 ? "positive" : change < 0 ? "negative" : "neutral";
                    const changeText = change != null ? `${change >= 0 ? "+" : ""}${change.toFixed(2)}%` : "—";
                    card.querySelector(".asset-price").textContent = formatPrice(price, fiatCurrency);
                    const changeEl = card.querySelector(".asset-change");
                    changeEl.textContent = changeText + " 24h";
                    changeEl.className = "asset-change " + changeClass;
                }
                loadAllCharts(existingCards, coinMap);
            }

        } catch (err) {
            console.error("fetchPrices error:", err);
            const isCors = err.message?.includes("Failed to fetch") || err.name === "TypeError";
            const hint = isCors ? t("corsHint") : t("networkHint");
            grid.innerHTML = '<div class="message">' + t("loadError") + hint + ' <button class="primary" onclick="fetchPrices()" style="margin-top:10px">' + t("retry") + '</button></div>';
            setTimeout(fetchPrices, 15000);
        }
    }

    function buildCard(coin) {
        const price = coin.current_price ?? 0;
        const change = coin.price_change_percentage_24h;
        const changeClass = change > 0 ? "positive" : change < 0 ? "negative" : "neutral";
        const changeText = change != null ? `${change >= 0 ? "+" : ""}${change.toFixed(2)}%` : "—";
        const imgUrl = (coin.image || "").replace("/large/", "/small/");
        const escAttr = s => String(s || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
        const card = document.createElement("div");
        card.className = "asset-card";
        card.dataset.coinId = coin.id;
        card.draggable = true;
        card.innerHTML = `
            <div class="asset-card-main">
                <div class="asset-header">
                    <div class="asset-info">
                        <img src="${imgUrl}" class="asset-logo" alt="${coin.symbol}" onerror="this.src='https://assets.coingecko.com/coins/images/1/small/bitcoin.png'">
                        <div>
                            <div class="asset-name">${coin.name}</div>
                            <div class="asset-symbol">${coin.symbol.toUpperCase()}</div>
                        </div>
                    </div>
                </div>
                <div class="asset-price">${formatPrice(price, fiatCurrency)}</div>
                <div class="asset-change ${changeClass}">${changeText} 24h</div>
            </div>
            <div class="asset-chart-wrap">
                <div class="chart-expand-row">
                    <button type="button" class="chart-expand-btn" draggable="false" data-coin-id="${escAttr(coin.id)}" data-coin-name="${escAttr(coin.name)}" data-coin-symbol="${escAttr((coin.symbol||'').toUpperCase())}" onclick="openChartModal(this)" title="${escAttr(t('expandChart'))}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                    </button>
                </div>
                <canvas width="90" height="60"></canvas>
                <span class="chart-label">24h</span>
            </div>
        `;
        return card;
    }

    const CRYPTOCOMPARE_API = "https://min-api.cryptocompare.com/data/v2/histohour";

    async function loadChart(card, coin, delayMs = 0) {
        if (delayMs > 0) await new Promise(r => setTimeout(r, delayMs));
        if (!card || !document.contains(card)) return;
        const sym = (coin.symbol || coin.id || "").toUpperCase();
        if (!sym || sym === "USDT" || sym === "USDC") return;
        const tsym = (fiatCurrency || "usd").toUpperCase();
        try {
            const res = await apiFetch(`${CRYPTOCOMPARE_API}?fsym=${sym}&tsym=${tsym}&limit=24`);
            const json = await res.json();
            const arr = json?.Data?.Data;
            if (!Array.isArray(arr) || arr.length < 2) return;
            const points = arr.map(d => [d.time * 1000, d.close]);
            const canvas = card.querySelector(".asset-chart-wrap canvas");
            if (canvas) drawLineChart(canvas, points);
        } catch (e) { /* ignore */ }
    }

    async function loadAllCharts(cards, coinMap) {
        for (let i = 0; i < cards.length; i++) {
            const card = cards[i];
            const coin = coinMap[card.dataset.coinId];
            if (coin) await loadChart(card, coin, i * 1200);
        }
    }

    function drawLineChart(canvas, points) {
        if (points.length < 2) return;
        const ctx = canvas.getContext("2d");
        const w = canvas.width, h = canvas.height;
        const pad = 4;
        const vals = points.map(p => p[1]);
        const min = Math.min(...vals);
        const max = Math.max(...vals);
        const range = max - min || 1;
        const t0 = points[0][0], t1 = points[points.length - 1][0] || 1;

        ctx.clearRect(0, 0, w, h);
        ctx.beginPath();
        points.forEach((p, i) => {
            const x = pad + ((p[0] - t0) / (t1 - t0)) * (w - pad * 2);
            const y = h - pad - ((p[1] - min) / range) * (h - pad * 2);
            ctx[i ? "lineTo" : "moveTo"](x, y);
        });
        ctx.strokeStyle = vals[vals.length - 1] >= vals[0] ? "#00ff85" : "#ff4444";
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    const COINGECKO_TO_BINANCE = { binancecoin: "BNB", ripple: "XRP", polkadot: "DOT", "matic-network": "MATIC", "avalanche-2": "AVAX", "shiba-inu": "SHIB", tron: "TRX", dai: "DAI", litecoin: "LTC", "bitcoin-cash": "BCH", cosmos: "ATOM", uniswap: "UNI", chainlink: "LINK", stellar: "XLM", monero: "XMR", "ethereum-classic": "ETC", filecoin: "FIL", "internet-computer": "ICP", aptos: "APT", arbitrum: "ARB", optimism: "OP", near: "NEAR", sui: "SUI", "sei-network": "SEI", "injective-protocol": "INJ" };
    const CURRENCY_EXCHANGES = [
        { cur: "usd", exchange: "BINANCE", quote: "USDT" },
        { cur: "eur", exchange: "BINANCE", quote: "EUR" },
        { cur: "gbp", exchange: "BINANCE", quote: "GBP" },
        { cur: "jpy", exchange: "BITFLYER", quote: "JPY" },
        { cur: "chf", exchange: "BINANCE", quote: "USDT" },
        { cur: "cad", exchange: "BINANCE", quote: "USDT" },
        { cur: "aud", exchange: "BINANCE", quote: "USDT" },
        { cur: "rub", exchange: "BINANCE", quote: "USDT" },
        { cur: "cny", exchange: "BINANCE", quote: "USDT" },
        { cur: "krw", exchange: "UPBIT", quote: "KRW" },
        { cur: "inr", exchange: "BINANCE", quote: "USDT" },
        { cur: "brl", exchange: "BINANCE", quote: "BRL" },
        { cur: "mxn", exchange: "BINANCE", quote: "USDT" },
        { cur: "pln", exchange: "BINANCE", quote: "USDT" },
        { cur: "try", exchange: "BINANCE", quote: "TRY" },
        { cur: "uah", exchange: "BINANCE", quote: "UAH" },
        { cur: "btc", exchange: "BINANCE", quote: "BTC" },
        { cur: "eth", exchange: "BINANCE", quote: "ETH" }
    ];
    function getTradingViewSymbol(coinSymbol, coinId) {
        let s = (coinSymbol || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (coinId && COINGECKO_TO_BINANCE[coinId]) s = COINGECKO_TO_BINANCE[coinId];
        if (!s || s === "USDT" || s === "USDC" || s === "BUSD") return "BINANCE:BTCUSDT";
        const cur = (fiatCurrency || "usd").toLowerCase();
        const cfg = CURRENCY_EXCHANGES.find(c => c.cur === cur) || CURRENCY_EXCHANGES[0];
        return cfg.exchange + ":" + s + cfg.quote;
    }

    function renderChartWithSymbol(symbol) {
        const config = {
            autosize: true,
            symbol: symbol,
            interval: "60",
            timezone: "Etc/UTC",
            theme: "dark",
            style: "1",
            locale: "en",
            allow_symbol_change: true,
            calendar: false,
            support_host: "https://www.tradingview.com",
            hide_side_toolbar: false,
            enabled_features: ["side_toolbar_in_fullscreen_mode"],
            overrides: {
                "paneProperties.background": "#131722",
                "paneProperties.backgroundType": "solid",
                "paneProperties.backgroundGradientStartColor": "#131722",
                "paneProperties.backgroundGradientEndColor": "#131722"
            }
        };
        const container = document.getElementById("chart-tradingview-container");
        container.innerHTML = "";
        const iframe = document.createElement("iframe");
        iframe.setAttribute("scrolling", "no");
        iframe.style.cssText = "height:100%; width:100%; border:none; display:block;";
        iframe.src = "https://www.tradingview-widget.com/embed-widget/advanced-chart/#" + encodeURIComponent(JSON.stringify(config));
        container.appendChild(iframe);
    }

    function openChartModal(btn) {
        const coinSymbol = btn.dataset.coinSymbol || "";
        const coinId = btn.dataset.coinId || "";
        const symbol = getTradingViewSymbol(coinSymbol, coinId);
        const modal = document.getElementById("chart-modal");
        const loading = document.getElementById("chart-loading");
        const container = document.getElementById("chart-tradingview-container");
        modal.classList.add("show");
        document.body.classList.add("chart-modal-open");
        loading.style.display = "block";
        container.style.display = "none";
        container.innerHTML = "";
        loading.style.display = "none";
        container.style.display = "flex";
        renderChartWithSymbol(symbol);
    }

    function closeChartModal() {
        document.getElementById("chart-modal").classList.remove("show");
        document.body.classList.remove("chart-modal-open");
        document.getElementById("chart-tradingview-container").innerHTML = "";
    }

    document.getElementById("chart-modal").addEventListener("click", function(e) {
        if (e.target === this) closeChartModal();
    });
    document.addEventListener("keydown", function(e) {
        if (e.key === "Escape" && document.getElementById("chart-modal").classList.contains("show")) closeChartModal();
    });

    function saveOrderFromGrid() {
        const grid = document.getElementById("ticker-grid");
        const cards = grid.querySelectorAll(".asset-card[data-coin-id]");
        if (cards.length === 0) return;
        activeAssets = [...cards].map(c => c.dataset.coinId);
        localStorage.setItem("exchange_active_assets", JSON.stringify(activeAssets));
    }

    document.getElementById("ticker-grid").addEventListener("dragstart", function(e) {
        const card = e.target.closest(".asset-card[data-coin-id]");
        if (!card) return;
        card.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", card.dataset.coinId);
    });
    document.getElementById("ticker-grid").addEventListener("dragend", function(e) {
        const card = e.target.closest(".asset-card[data-coin-id]");
        if (card) card.classList.remove("dragging");
        document.querySelectorAll(".asset-card.drag-over").forEach(c => c.classList.remove("drag-over"));
    });
    document.getElementById("ticker-grid").addEventListener("dragover", function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        const card = e.target.closest(".asset-card[data-coin-id]");
        const dragging = document.querySelector(".asset-card.dragging");
        if (!card || !dragging || card === dragging) return;
        document.querySelectorAll(".asset-card.drag-over").forEach(c => c.classList.remove("drag-over"));
        card.classList.add("drag-over");
    });
    document.getElementById("ticker-grid").addEventListener("dragleave", function(e) {
        if (!e.target.closest(".asset-card")) return;
        const related = e.relatedTarget;
        if (!related || !document.getElementById("ticker-grid").contains(related)) {
            e.target.closest(".asset-card")?.classList.remove("drag-over");
        }
    });
    document.getElementById("ticker-grid").addEventListener("drop", function(e) {
        e.preventDefault();
        const card = e.target.closest(".asset-card[data-coin-id]");
        const dragging = document.querySelector(".asset-card.dragging");
        if (!card || !dragging || card === dragging) return;
        document.querySelectorAll(".asset-card.drag-over").forEach(c => c.classList.remove("drag-over"));
        const grid = document.getElementById("ticker-grid");
        const cards = [...grid.querySelectorAll(".asset-card[data-coin-id]")];
        const dragIdx = cards.indexOf(dragging);
        const dropIdx = cards.indexOf(card);
        if (dragIdx >= 0 && dropIdx >= 0 && dragIdx !== dropIdx) {
            if (dragIdx < dropIdx) {
                card.parentNode.insertBefore(dragging, card.nextSibling);
            } else {
                card.parentNode.insertBefore(dragging, card);
            }
            saveOrderFromGrid();
        }
        dragging.classList.remove("dragging");
    });

    (function() {
        const grid = document.getElementById("ticker-grid");
        let touchDrag = null;
        const THRESHOLD = 10;
        grid.addEventListener("touchstart", function(e) {
            if (e.target.closest("button") || e.target.closest("a")) return;
            const card = e.target.closest(".asset-card[data-coin-id]");
            if (!card) return;
            touchDrag = { card, startX: e.touches[0].clientX, startY: e.touches[0].clientY, active: false };
        }, { passive: true });
        grid.addEventListener("touchmove", function(e) {
            if (!touchDrag) return;
            const dx = Math.abs(e.touches[0].clientX - touchDrag.startX);
            const dy = Math.abs(e.touches[0].clientY - touchDrag.startY);
            if (!touchDrag.active && dx < THRESHOLD && dy < THRESHOLD) return;
            touchDrag.active = true;
            e.preventDefault();
            touchDrag.card.classList.add("dragging");
            const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
            const over = el?.closest(".asset-card[data-coin-id]");
            document.querySelectorAll(".asset-card.drag-over").forEach(c => c.classList.remove("drag-over"));
            if (over && over !== touchDrag.card) over.classList.add("drag-over");
        }, { passive: false });
        grid.addEventListener("touchend", function(e) {
            if (!touchDrag) return;
            const over = document.querySelector(".asset-card.drag-over");
            if (over && over !== touchDrag.card) {
                const cards = [...grid.querySelectorAll(".asset-card[data-coin-id]")];
                const dragIdx = cards.indexOf(touchDrag.card);
                const dropIdx = cards.indexOf(over);
                if (dragIdx >= 0 && dropIdx >= 0 && dragIdx !== dropIdx) {
                    if (dragIdx < dropIdx) {
                        over.parentNode.insertBefore(touchDrag.card, over.nextSibling);
                    } else {
                        over.parentNode.insertBefore(touchDrag.card, over);
                    }
                    saveOrderFromGrid();
                }
            }
            touchDrag.card.classList.remove("dragging");
            document.querySelectorAll(".asset-card.drag-over").forEach(c => c.classList.remove("drag-over"));
            touchDrag = null;
        }, { passive: true });
        grid.addEventListener("touchcancel", function() {
            if (touchDrag) {
                touchDrag.card.classList.remove("dragging");
                document.querySelectorAll(".asset-card.drag-over").forEach(c => c.classList.remove("drag-over"));
                touchDrag = null;
            }
        }, { passive: true });
    })();

    document.getElementById("view-cards").classList.toggle("active", viewMode === "cards");
    document.getElementById("view-compact").classList.toggle("active", viewMode === "compact");
    document.getElementById("ticker-grid").classList.toggle("compact", viewMode === "compact");

    applyLang();
    fetchPrices();
    refreshIntervalId = setInterval(fetchPrices, REFRESH_RATE);
</script>
